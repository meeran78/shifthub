name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      DATABASE_URL: postgresql://user:pass@localhost:5432/shifthub?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint & typecheck (packages)
        run: pnpm exec turbo run lint typecheck --filter=@shifthub/db --filter=@shifthub/validators --filter=@shifthub/api

      - name: Build web
        run: pnpm exec turbo run build --filter=web

      - name: Mobile typecheck
        run: pnpm exec turbo run typecheck --filter=mobile
